            contentEvaluator: {}
            userExtractor: {}
            dataPurge: {}
            formattingEvaluator: {}
            payment: {}
            githubComment: {}
          evmPrivateEncrypted: "-zT6DOc09hYaCK0Tu11sqBwfEwU7R7JKf14UruKjdQavGlysADYZ7UBGpwY7RKV6IOONyFatqKZrBte9xOQbOVrNwx7eQEn1k7pRCFMgIsQ2Ro0Ld9Uun_GzTLGE2oSRSN5JKQwNjSO_In14SR2PN-9lYVco3BOM7lNcMrDucj1TfjJqtg"
          evmNetworkId: 100
  - uses:
      - plugin: "ubiquity-os-marketplace/daemon-disqualifier@v1.0.0"
  - uses:
      - plugin: "ubiquity-os-marketplace/text-vector-embeddings@v1.0.0"
        with:
          demoFlag: true
